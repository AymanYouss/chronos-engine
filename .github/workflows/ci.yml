name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chronos
          POSTGRES_PASSWORD: chronos
          POSTGRES_DB: chronos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chronos -d chronos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      CHRONOS_TEST_DSN: postgres://chronos:chronos@localhost:5432/chronos?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Verify formatting
        run: |
          fmt_out=$(gofmt -l $(find . -name '*.go' -not -path './api/gen/*'))
          if [ -n "$fmt_out" ]; then echo "gofmt needed on:"; echo "$fmt_out"; exit 1; fi
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test (with Postgres integration)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [go, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          tags: chronos-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: web/Dockerfile
          push: false
          tags: chronos-engine-web:ci

  terraform:
    name: Terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Check formatting
        run: terraform -chdir=deploy/aws fmt -check -recursive
