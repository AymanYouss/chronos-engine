version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/AymanYouss/chronos-engine/api/gen
plugins:
  - local: protoc-gen-go
    out: api/gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: api/gen
    opt: paths=source_relative
