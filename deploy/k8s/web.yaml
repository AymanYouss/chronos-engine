apiVersion: apps/v1
kind: Deployment
metadata:
  name: chronos-web
  namespace: chronos
  labels:
    app.kubernetes.io/name: chronos-web
    app.kubernetes.io/component: inspector
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: chronos-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chronos-web
        app.kubernetes.io/component: inspector
    spec:
      containers:
        - name: web
          image: ghcr.io/aymanyouss/chronos-engine-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 80 }
          env:
            # nginx proxies /api and /healthz to the control plane.
            - name: CHRONOS_API_UPSTREAM
              value: "http://chronos-server:8080"
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: chronos-web
  namespace: chronos
spec:
  selector:
    app.kubernetes.io/name: chronos-web
  ports:
    - { name: http, port: 80, targetPort: http }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chronos-web
  namespace: chronos
  annotations:
    # AWS Load Balancer Controller (installed on EKS) provisions an ALB.
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chronos-web
                port:
                  number: 80
