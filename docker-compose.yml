name: chronos

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: chronos
      POSTGRES_DB: chronos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos -d chronos"]
      interval: 3s
      timeout: 3s
      retries: 20

  server:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        VERSION: docker
    command: ["/usr/local/bin/chronos-server"]
    environment:
      CHRONOS_DATABASE_URL: postgres://chronos:chronos@postgres:5432/chronos?sslmode=disable
      CHRONOS_GRPC_ADDR: ":7233"
      CHRONOS_HTTP_ADDR: ":8080"
      CHRONOS_METRICS_ADDR: ":9090"
    ports:
      - "7233:7233"   # gRPC control plane
      - "8080:8080"   # inspector REST API
      - "9090:9090"   # Prometheus metrics
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        VERSION: docker
    command: ["/usr/local/bin/chronos-worker"]
    environment:
      CHRONOS_SERVER: server:7233
      CHRONOS_DATABASE_URL: postgres://chronos:chronos@postgres:5432/chronos?sslmode=disable
      CHRONOS_TASK_QUEUE: default
      CHRONOS_WORKER_CONCURRENCY: "8"
      CHRONOS_METRICS_ADDR: ":9091"
    deploy:
      replicas: 2
    depends_on:
      - server

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "8088:80"
    depends_on:
      - server

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9099:9090"
    depends_on:
      - server

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: chronos
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
